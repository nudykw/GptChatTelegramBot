# =============================================================================
# GptChatTelegramBot — Nginx reverse proxy
# =============================================================================
# Profile: nginx
#
# Routing:
#   /              → bot (TelegramBotWebApp, port 8080)
#   /cloudbeaver/  → CloudBeaver (port 8978, served at /cloudbeaver/ via rootURI)
#
# If cloudbeaver profile is OFF, requests to /cloudbeaver/ return 502.
# =============================================================================

# Map HTTP Upgrade header → Connection value (needed for WebSocket proxying)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # ──────────────────────────────────────────────────────────────────────────
    # CloudBeaver — Web database manager
    #
    # CloudBeaver is configured (via cloudbeaver.conf) to serve at rootURI
    # /cloudbeaver. Nginx forwards the full path without stripping the prefix,
    # so /cloudbeaver/... lands at cloudbeaver:8978/cloudbeaver/... correctly.
    #
    # WebSocket support is required for CloudBeaver's real-time features.
    # ──────────────────────────────────────────────────────────────────────────
    location /cloudbeaver/ {
        proxy_pass         http://cloudbeaver:8978;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        # Long timeout for slow query execution in the DB editor
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # Bot — TelegramBotWebApp (ASP.NET)
    #
    # Handles all remaining traffic, including:
    #   /aibot      — Telegram Webhook endpoint
    #   /scalar/v1  — Swagger UI (when SWAGGER_ENABLED=true)
    #   /health     — health check
    # ──────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://bot:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
